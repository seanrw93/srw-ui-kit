<div class="faq-accordion">
  @for (item of items; track item.question; let i = $index) {
    <div class="faq-accordion__item" [class.faq-accordion__item--open]="openIndex() === i">
      <button class="faq-accordion__trigger" (click)="toggle(i)" [attr.aria-expanded]="openIndex() === i">
        <span>{{ item.question }}</span>
        <span class="faq-accordion__icon" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              [attr.opacity]="openIndex() === i ? 0 : 1"
              style="transition: opacity 0.3s"
            />
            <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
      </button>
      <div class="faq-accordion__content" [style.maxHeight]="openIndex() === i ? '600px' : '0'">
        <div class="faq-accordion__content-inner">
          <p>{{ item.answer }}</p>
        </div>
      </div>
    </div>
  }
</div>
