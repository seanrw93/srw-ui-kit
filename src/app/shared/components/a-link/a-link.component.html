<a
  class="btn"
  [class]="'btn btn--' + variant + ' btn--' + size"
  [attr.href]="disabled ? null : (href ?? '#')"
  [attr.target]="external ? '_blank' : null"
  [attr.rel]="external ? 'noreferrer' : null"
  [attr.aria-disabled]="disabled || null"
  [attr.tabindex]="disabled ? '-1' : null"
>
  <ng-content />
</a>
