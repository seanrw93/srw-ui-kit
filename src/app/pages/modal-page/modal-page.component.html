<div class="page">
  <h1 class="page__title">Modal</h1>
  <p class="page__desc">Driven by <code>ModalService</code>. Closes on backdrop click. Supports a danger variant.</p>

  <section class="demo-block">
    <span class="demo-block__label">Trigger</span>
    <div class="demo-block__content demo-block__content--row">
      <srw-button variant="primary" (click)="openDefault()">Open modal</srw-button>
      <srw-button variant="outline" (click)="openDanger()">Open danger modal</srw-button>
    </div>
  </section>
</div>
